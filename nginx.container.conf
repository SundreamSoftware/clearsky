server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy OpenAQ API — injects API key server-side (avoids CORS preflight from X-API-Key header)
    location /openaq-api/ {
        proxy_pass https://api.openaq.org/v3/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.openaq.org;
        include /etc/nginx/openaq-apikey.conf;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy GIOŚ API — avoids CORS (browser → same origin → nginx → GIOŚ)
    location /api/ {
        proxy_pass https://api.gios.gov.pl/pjp-api/v1/rest/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.gios.gov.pl;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
