name: Deploy ClearSky

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/sundreamsoftware/clearsky:latest

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Build app
        run: npm run build
        env:
          VITE_GIOS_API_BASE_URL: /api

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME --build-arg VITE_OPENAQ_API_KEY=${{ secrets.OPENAQ_API_KEY }} .

      - name: Push Docker image
        run: docker push $IMAGE_NAME

      - name: Deploy and verify via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /opt/clearsky
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "Waiting for container to be ready..."
            for i in 1 2 3 4 5 6; do
              if curl -sf http://127.0.0.1:5010/health; then
                echo "Health check passed on attempt $i"
                break
              fi
              if [ "$i" -eq 6 ]; then
                echo "Health check failed after 30s"
                docker compose ps
                docker compose logs --tail=50
                exit 1
              fi
              echo "Attempt $i failed, retrying in 5s..."
              sleep 5
            done

            docker compose ps
            echo "Deployment complete"