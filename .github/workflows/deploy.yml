name: Deploy ClearSky

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/sundreamsoftware/clearsky:latest

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Build app
        run: npm run build
        env:
          VITE_GIOS_API_BASE_URL: /api

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: Push Docker image
        run: docker push $IMAGE_NAME

      - name: Deploy and verify via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            mkdir -p /opt/clearsky

            # Write docker-compose.yml — ensures server always has the latest version
            cat > /opt/clearsky/docker-compose.yml << 'YAMLEOF'
            services:
              clearsky-web:
                image: ghcr.io/sundreamsoftware/clearsky:latest
                container_name: clearsky-web
                restart: unless-stopped
                ports:
                  - "127.0.0.1:5010:80"
                volumes:
                  - ./waqi-token.conf:/etc/nginx/waqi-token.conf:ro
                healthcheck:
                  test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 10s
            YAMLEOF

            # Write WAQI token config directly — bypasses the env-var chain entirely
            printf 'set $waqi_token "%s";\n' '${{ secrets.WAQI_TOKEN }}' > /opt/clearsky/waqi-token.conf

            cd /opt/clearsky
            docker login ghcr.io -u ${{ github.actor }} --password '${{ secrets.GITHUB_TOKEN }}'
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f

            echo "Waiting for container to be ready..."
            for i in 1 2 3 4 5 6; do
              if curl -sf http://127.0.0.1:5010/health; then
                echo "Health check passed on attempt $i"
                break
              fi
              if [ "$i" -eq 6 ]; then
                echo "Health check failed after 30s"
                docker compose ps
                docker compose logs --tail=50
                exit 1
              fi
              echo "Attempt $i failed, retrying in 5s..."
              sleep 5
            done

            docker compose ps
            echo "Deployment complete"